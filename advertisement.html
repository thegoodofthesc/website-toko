<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <title>e-commerce</title>
</head>
<body>

    <header>
        <div class="header">
            <div class="header-container">
                <img class="header-icon" src="assets/magicpattern-blob-1781320410809.png" alt="">
                <h3 class="title"><a href="index.html">Shop</a></h3>

                <nav>
                    <a href="index.html">Product</a>
                    <a href="contact.html">Contact</a>
                    <a href="advertisement.html">Advertisement</a>
                </nav>
            </div>
        </div>
    </header>

    <main>
        <div class="contact">
            <h1>Advertisement</h1>
            <p>Please fill the Information below</p>
            <h4>Your Information</h4>
        </div>

        <form action="contact.html" autocomplete="off">
            <div class="form-container">

                <div class="input-container">
                    <div class="icon">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="form-input">
                        <input class="input-item" type="text" name="name" id="name" placeholder="">
                        <label for="name" class="form-label">Company Name</label>
                    </div>
                </div>


                <div class="input-container">
                    <div class="icon">
                        <i class="fas fa-map-marker-alt"></i>
                    </div>
                    <div class="form-input">
                        <input class="input-item" type="text" name="city" id="city" placeholder="">
                        <label for="city" class="form-label">Location</label>
                    </div>
                </div>


                <div class="input-container">
                    <div class="icon">
                        <i class="far fa-envelope-open"></i>
                    </div>
                    <div class="form-input">
                        <input class="input-item" type="text" name="email" id="email" placeholder="">
                        <label for="email" class="form-label">Email</label>
                    </div>
                </div>

                <div class="input-container">
                    <div class="icon">
                        <i class="far fa-envelope-open"></i>
                    </div>
                    <div class="form-input">
                        <input class="input-item" type="text" name="product" id="product" placeholder="">
                        <label for="email" class="form-label">Product</label>
                    </div>
                </div>


                <div class="textarea-container">
                    <div class="icon">
                        <i class="fas fa-comment"></i>
                    </div>
                    <div class="form-textarea">
                        <textarea class="textarea" type="text" name="message" id="message" cols="52" rows="8" placeholder=""></textarea>
                        <label for="message" class="form-label">Message</label>
                    </div>
                </div>
            </div>

            <input type="submit" value="Submit" class="submit">
        </form>
    </main>

    <footer>
        <footer class="footer">
            <div class="footer-container">
                <div class="footer-logo">
                <img src="assets/magicpattern-blob-1781320410809.png" alt="Logo">
            </div>

            <div class="footer-links">
                <a href="">Indonesia</a>
                <a href="">Terms of Service</a>
                <a href="">Privacy Policy</a>
                <a href="">Your Privacy Choices</a>
            </div>
        </div>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="script.js"></script>
    <script>
        AOS.init();
    </script>
</body>
</html>
